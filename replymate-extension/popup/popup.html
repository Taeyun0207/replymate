<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReplyMate Settings</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --text: #222222;
      --muted: #5f6368;
      --border: #d0d7de;
      --select-bg: #ffffff;
      --select-text: #222222;
      --button-bg: #7943f1;
      --button-text: #ffffff;
      --success: #188038;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #202124;
        --text: #e8eaed;
        --muted: #9aa0a6;
        --border: #5f6368;
        --select-bg: #303134;
        --select-text: #e8eaed;
        --button-bg: #7943f1; /* 유지 */
        --button-text: #ffffff; /* 유지 */
        --success: #188038; /* 유지 */
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 260px;
      padding: 14px;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    h2 {
      margin: 0 0 14px 0;
      font-size: 18px;
      line-height: 1.2;
      color: var(--text);
    }

    .field {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    select {
      width: 100%;
      padding: 9px 10px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--select-bg);
      color: var(--select-text);
      outline: none;
    }

    input[type="text"] {
      width: 100%;
      padding: 9px 10px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--select-bg);
      color: var(--select-text);
      outline: none;
    }

/* FIX: dropdown option text visibility */
option {
  color: #000;
  background: #fff;
}

@media (prefers-color-scheme: dark) {
  option {
    color: #fff;
    background: #303134;
  }
}

    select:focus {
      border-color: var(--button-bg);
    }

    button {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: var(--button-bg);
      color: var(--button-text);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #b794f6;
      color: #222222;
    }

    button:disabled {
      opacity: 0.7;
      cursor: default;
    }

    #statusMessage {
      display: none; /* Hidden since we'll use button feedback instead */
    }

    .plan-usage {
      margin: 12px 0 8px 0;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .upgrade-box {
      margin: 8px 0 0 0;
      padding: 12px;
      border: 1px solid #e8eaed;
      border-radius: 8px;
      background: #EFE8FF;
      text-align: center;
    }

    .upgrade-title {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .renewal-date {
      font-size: 11px;
      color: #3c4043;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .topup-available {
      font-size: 10px;
      color: #3c4043;
      margin: 4px 0 6px 0;
      line-height: 1.3;
    }

    .topup-section {
      margin: 8px 0 0 0;
      padding: 8px 0 0 0;
      border-top: 1px solid var(--border);
    }

    .topup-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .topup-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .topup-pill {
      padding: 6px 12px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .topup-pill:hover {
      border-color: var(--button-bg);
      color: var(--button-bg);
    }

    .upgrade-link {
      font-size: 13px;
      color: var(--button-bg);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .upgrade-link:hover {
      text-decoration: underline;
    }

    .upgrade-buttons {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .upgrade-pro {
      padding: 8px 12px;
      border: 1px solid #ffffff;
      border-radius: 6px;
      background: #ffffff;
      color: #000000 ;
      display: block;
      text-align: center;
      transition: all 0.2s ease;
    }

    .upgrade-pro:hover {
      background: #D3D3D3  ;
      text-decoration: none;
      border-color: #D3D3D3  ;
    }

    .upgrade-pro-plus {
      padding: 8px 12px;
      border: 1px solid #FFFF99;
      border-radius: 6px;
      background: linear-gradient(135deg, #FFD700 0%, #FFD700 50%, #FFFF99 100%);
      color: #2C1810;
      display: block;
      text-align: center;
      font-weight: 600;
      box-shadow: 0 2px 4px rgba(212, 175, 55, 0.3);
      transition: all 0.2s ease;
    }

    .upgrade-pro-plus:hover {
      background: linear-gradient(135deg, #FFD700 0%, #B8860B 50%, #8B6914 100%);
      text-decoration: none;
      box-shadow: 0 4px 8px rgba(212, 175, 55, 0.4);
      transform: translateY(-1px);
    }

    @media (prefers-color-scheme: dark) {
      /* Google sign-in box - dark mode */
      .sign-in-button {
        background: #202124;
        border-color: #5F6368;
        color: #E8EAED;
      }

      .sign-in-button:hover {
        background: #2B2C2F;
      }

      .upgrade-pro:hover {
        background: #D3D3D3;
        border-color: #D3D3D3;
      }

      .upgrade-pro-plus {
        background: linear-gradient(135deg, #FFD700 0%, #FFD700 50%, #FFFF99 100%);
        color: #2C1810;
      }

      .upgrade-pro-plus:hover {
        background: linear-gradient(135deg, #FFD700 0%, #B8860B 50%, #8B6914 100%);
        text-decoration: none;
        box-shadow: 0 4px 8px rgba(212, 175, 55, 0.4);
        transform: translateY(-1px);
      }
      
      .upgrade-box {
        border-color: #808080 ;
        background: #808080 ;
      }
      
      .upgrade-title {
        color: #000000 !important; /* 프로플러스일 때 검정색으로 변경 */
      }
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .header-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 18px;
      line-height: 1.2;
      color: var(--text);
      margin: 0;
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
    }

    .footer a {
      color: var(--muted);
      text-decoration: none;
      margin: 0 8px;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .cancel-section {
      margin-top: 10px;
      text-align: center;
    }

    .cancel-link {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      cursor: pointer;
    }

    .cancel-link:hover {
      text-decoration: underline;
    }

    .login-section {
      margin-bottom: 14px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    /* Google Sign-In button - light mode */
    .gsi-material-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 40px;
      padding: 0 24px;
      font-family: "Google Sans", Roboto, Arial, sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid #DADCE0;
      border-radius: 24px;
      background: #FFFFFF;
      color: #3C4043;
      cursor: pointer;
      transition: background 0.2s ease, box-shadow 0.2s ease, color 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .gsi-material-button:hover {
      background: #F8F9FA;
      box-shadow: 0 1px 2px rgba(60, 64, 67, 0.3);
    }

    .gsi-material-button-state {
      position: absolute;
      inset: 0;
      background: transparent;
    }

    .gsi-material-button-content-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .gsi-material-button-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gsi-material-button-icon svg {
      width: 18px;
      height: 18px;
    }

    .gsi-material-button-contents {
      white-space: nowrap;
    }

    @media (prefers-color-scheme: dark) {
      .gsi-material-button {
        background: #1F1F1F;
        border-color: #8E8E93;
        color: #E8EAED;
      }

      .gsi-material-button:hover {
        background: #3D3D3D;
        border-color: #A0A0A5;
        color: #FFFFFF;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      }
    }

    .signed-in-email {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .sign-out-button {
      padding: 6px 12px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .sign-out-button:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="header">
    <img class="header-icon" src="../icons/icon32.png" alt="ReplyMate Icon">
    <h2 class="header-title">ReplyMate Settings</h2>
  </div>

  <div id="loginSection" class="login-section">
    <div id="loginNotSignedIn" style="display: none;">
      <button id="signInButton" type="button" class="gsi-material-button">
        <div class="gsi-material-button-state"></div>
        <div class="gsi-material-button-content-wrapper">
          <div class="gsi-material-button-icon">
            <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
            </svg>
          </div>
          <span class="gsi-material-button-contents">Sign in with Google</span>
        </div>
      </button>
    </div>
    <div id="loginSignedIn" style="display: none;">
      <div id="signedInEmail" class="signed-in-email"></div>
      <button id="signOutButton" type="button" class="sign-out-button">Sign out</button>
    </div>
  </div>

  <div class="field">
    <label for="toneSelect">Reply Tone</label>
    <select id="toneSelect">
      <option value="auto" selected>Auto (recommended)</option>
      <option value="professional">Professional</option>
      <option value="polite">Polite</option>
      <option value="friendly">Friendly</option>
      <option value="direct">Direct</option>
    </select>
  </div>

  <div class="field">
    <label for="lengthSelect">Reply Length</label>
    <select id="lengthSelect">
      <option value="auto" selected>Auto (recommended)</option>
      <option value="short">Short</option>
      <option value="medium">Medium</option>
      <option value="long">Long</option>
    </select>
  </div>

  <div class="field">
    <label for="userNameInput">Your Name</label>
    <input
      id="userNameInput"
      type="text"
      placeholder="Enter your name"
      autocomplete="off"
    />
  </div>

  <div class="field">
    <label for="languageSelect">Language</label>
    <select id="languageSelect">
      <option value="english">English</option>
      <option value="korean">Korean</option>
      <option value="japanese">Japanese</option>
    </select>
  </div>

  <button id="saveButton" type="button">Save</button>
  <div id="statusMessage">Saved!</div>
  
  <div class="plan-usage">
    Loading...
  </div>
  <div id="topupAvailable" class="topup-available" style="display: none;"></div>
  
  <div class="upgrade-box">
    <div class="upgrade-title">Unlock more replies with Pro</div>
    <div id="renewalDate" class="renewal-date" style="display: none;"></div>
    <div class="upgrade-buttons">
      <a id="upgradeProLink" href="#" class="upgrade-link upgrade-pro">Upgrade to Pro</a>
      <a id="upgradeProPlusLink" href="#" class="upgrade-link upgrade-pro-plus">Upgrade to Pro+</a>
    </div>
  </div>
  
  <div id="topupSection" class="topup-section">
    <div class="topup-label">Top up replies</div>
    <div class="topup-buttons">
      <button type="button" id="topup100Btn" class="topup-pill">+100</button>
      <button type="button" id="topup500Btn" class="topup-pill">+500</button>
    </div>
  </div>
  
  <div id="cancelSection" class="cancel-section" style="display: none;">
    <a id="cancelSubscriptionLink" href="#" class="cancel-link">Cancel Subscription</a>
  </div>
  
  <div class="footer">
    <a href="https://taeyun0207.github.io/replymate-legal/index.html" target="_blank">Privacy Policy</a> | 
    <a href="mailto:replymate.support@gmail.com">Support</a>
  </div>
  
  <script src="../lib/supabase.min.js"></script>
  <script src="../lib/auth-config.js"></script>
  <script src="../lib/auth-shared.js"></script>
  <script src="../lib/auth.js"></script>
  <script src="popup.js"></script>
</body>
</html>
